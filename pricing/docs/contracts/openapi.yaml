{
  "openapi": "3.1.0",
  "info": {
    "title": "OCI Pricing Agent API",
    "version": "1.0.0",
    "description": "Stable versioned API contract for the OCI Pricing Agent server."
  },
  "servers": [
    {
      "url": "/api/v1",
      "description": "Current stable version"
    }
  ],
  "paths": {
    "/assistant": {
      "post": {
        "summary": "Run the assistant pipeline",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/AssistantRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Assistant reply",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/AssistantResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ErrorResponse" },
          "404": { "$ref": "#/components/responses/ErrorResponse" },
          "409": { "$ref": "#/components/responses/ErrorResponse" },
          "422": { "$ref": "#/components/responses/ErrorResponse" },
          "500": { "$ref": "#/components/responses/ErrorResponse" },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/chat": {
      "post": {
        "summary": "Run direct chat against OCI GenAI",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ChatRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Chat completion",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ChatResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ErrorResponse" },
          "500": { "$ref": "#/components/responses/ErrorResponse" },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/providers": {
      "get": {
        "summary": "Inspect OCI provider configuration",
        "responses": {
          "200": {
            "description": "Provider summary",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/ProvidersResponse" }
              }
            }
          }
        }
      }
    },
    "/health": {
      "get": {
        "summary": "Inspect server readiness",
        "responses": {
          "200": {
            "description": "Health summary",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/HealthResponse" }
              }
            }
          }
        }
      }
    },
    "/catalog/search": {
      "get": {
        "summary": "Search catalog content",
        "parameters": [
          {
            "name": "q",
            "in": "query",
            "required": false,
            "schema": { "type": "string" }
          }
        ],
        "responses": {
          "200": {
            "description": "Catalog search result",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CatalogSearchResponse" }
              }
            }
          },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/coverage": {
      "get": {
        "summary": "Inspect deterministic coverage",
        "parameters": [
          {
            "name": "q",
            "in": "query",
            "required": false,
            "schema": { "type": "string" }
          }
        ],
        "responses": {
          "200": {
            "description": "Coverage result",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/CoverageResponse" }
              }
            }
          },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/catalog/{file}": {
      "get": {
        "summary": "Read one cached catalog file",
        "parameters": [
          {
            "name": "file",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "enum": [
                "products.json",
                "productpresets.json",
                "metrics.json",
                "products-apex.json"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Cached catalog payload",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "additionalProperties": true
                }
              }
            }
          },
          "202": { "$ref": "#/components/responses/ErrorResponse" },
          "404": { "$ref": "#/components/responses/ErrorResponse" },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/catalog/reload": {
      "post": {
        "summary": "Trigger catalog reload",
        "responses": {
          "200": {
            "description": "Reload accepted",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/OkResponse" }
              }
            }
          }
        }
      }
    },
    "/quote": {
      "post": {
        "summary": "Build a deterministic quote",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/QuoteRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Quote result",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/QuoteResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ErrorResponse" },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/excel/estimate": {
      "post": {
        "summary": "Build a quote from workbook data",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/ExcelEstimateRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Workbook estimate result",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/WorkbookEstimateResponse" }
              }
            }
          },
          "400": { "$ref": "#/components/responses/ErrorResponse" },
          "404": { "$ref": "#/components/responses/ErrorResponse" },
          "409": { "$ref": "#/components/responses/ErrorResponse" },
          "422": { "$ref": "#/components/responses/ErrorResponse" },
          "500": { "$ref": "#/components/responses/ErrorResponse" },
          "503": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/sessions": {
      "get": {
        "summary": "List sessions",
        "responses": {
          "200": {
            "description": "Session list",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SessionsListResponse" }
              }
            }
          }
        }
      },
      "post": {
        "summary": "Create a session",
        "requestBody": {
          "required": false,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/CreateSessionRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Created session",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SessionEnvelope" }
              }
            }
          }
        }
      },
      "delete": {
        "summary": "Delete all sessions for the current client",
        "responses": {
          "200": {
            "description": "Delete confirmation",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/OkResponse" }
              }
            }
          }
        }
      }
    },
    "/sessions/{id}": {
      "get": {
        "summary": "Read one session",
        "parameters": [
          { "$ref": "#/components/parameters/SessionId" }
        ],
        "responses": {
          "200": {
            "description": "Session payload",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SessionEnvelope" }
              }
            }
          },
          "404": { "$ref": "#/components/responses/ErrorResponse" }
        }
      },
      "delete": {
        "summary": "Delete one session",
        "parameters": [
          { "$ref": "#/components/parameters/SessionId" }
        ],
        "responses": {
          "200": {
            "description": "Delete confirmation",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/OkResponse" }
              }
            }
          },
          "404": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/sessions/{id}/quote-export": {
      "get": {
        "summary": "Export the last persisted quote",
        "parameters": [
          { "$ref": "#/components/parameters/SessionId" },
          {
            "name": "format",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": ["csv", "json", "xlsx"]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Quote export",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/QuoteExportEnvelope" }
              },
              "text/csv": {
                "schema": { "type": "string" }
              },
              "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": {
                "schema": { "type": "string", "format": "binary" }
              }
            }
          },
          "404": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/sessions/{id}/messages": {
      "post": {
        "summary": "Append a message to a session",
        "parameters": [
          { "$ref": "#/components/parameters/SessionId" }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/SessionMessageRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated session",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SessionEnvelope" }
              }
            }
          },
          "404": { "$ref": "#/components/responses/ErrorResponse" },
          "409": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    },
    "/sessions/{id}/state": {
      "post": {
        "summary": "Update session state",
        "parameters": [
          { "$ref": "#/components/parameters/SessionId" }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": { "$ref": "#/components/schemas/SessionStateRequest" }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Updated session",
            "content": {
              "application/json": {
                "schema": { "$ref": "#/components/schemas/SessionEnvelope" }
              }
            }
          },
          "404": { "$ref": "#/components/responses/ErrorResponse" },
          "409": { "$ref": "#/components/responses/ErrorResponse" }
        }
      }
    }
  },
  "components": {
    "parameters": {
      "SessionId": {
        "name": "id",
        "in": "path",
        "required": true,
        "schema": { "type": "string" }
      }
    },
    "responses": {
      "ErrorResponse": {
        "description": "Semantic error response",
        "content": {
          "application/json": {
            "schema": { "$ref": "#/components/schemas/ErrorResponse" }
          }
        }
      }
    },
    "schemas": {
      "OkResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" }
        },
        "required": ["ok"],
        "additionalProperties": false
      },
      "ConversationMessage": {
        "type": "object",
        "properties": {
          "role": {
            "type": "string",
            "enum": ["system", "user", "assistant", "agent"]
          },
          "content": { "type": "string" }
        },
        "required": ["role", "content"],
        "additionalProperties": false
      },
      "AssistantRequest": {
        "type": "object",
        "properties": {
          "text": { "type": "string" },
          "imageDataUrl": { "type": "string" },
          "conversation": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/ConversationMessage" }
          },
          "sessionId": { "type": "string" },
          "userLabel": { "type": "string" },
          "clientId": { "type": "string" }
        },
        "additionalProperties": false
      },
      "AssistantResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "mode": { "type": "string" },
          "message": { "type": "string" },
          "question": { "type": "string" },
          "session": { "$ref": "#/components/schemas/Session" },
          "sessionContext": {
            "type": "object",
            "additionalProperties": true
          },
          "intent": {
            "type": "object",
            "additionalProperties": true
          },
          "quote": {
            "type": "object",
            "additionalProperties": true
          },
          "quoteMarkdown": { "type": "string" },
          "warnings": {
            "type": "array",
            "items": { "type": "string" }
          },
          "totals": { "$ref": "#/components/schemas/Totals" }
        },
        "additionalProperties": true
      },
      "ChatRequest": {
        "type": "object",
        "properties": {
          "system": { "type": "string" },
          "messages": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/ConversationMessage" }
          },
          "profile": { "type": "string" },
          "max_tokens": { "type": "number" },
          "temperature": { "type": "number" },
          "top_p": { "type": "number" },
          "top_k": { "type": "number" },
          "model": { "type": "string" },
          "sessionId": { "type": "string" },
          "clientId": { "type": "string" }
        },
        "additionalProperties": false
      },
      "ChatResponse": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "type": { "type": "string" },
          "role": { "type": "string" },
          "content": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": true
            }
          },
          "model": { "type": "string" },
          "stop_reason": { "type": "string" },
          "raw": {
            "type": "object",
            "additionalProperties": true
          }
        },
        "additionalProperties": true
      },
      "ProvidersResponse": {
        "type": "object",
        "properties": {
          "oci": {
            "type": "object",
            "properties": {
              "configured": { "type": "boolean" },
              "region": { "type": "string" },
              "endpoint": { "type": "string", "nullable": true },
              "compartment": { "type": "string" },
              "modelId": { "type": "string" },
              "profile": { "type": "string" }
            },
            "additionalProperties": false
          }
        },
        "required": ["oci"],
        "additionalProperties": false
      },
      "HealthResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "catalogsLoaded": { "type": "integer" },
          "loading": { "type": "boolean" },
          "catalogs": {
            "type": "object",
            "additionalProperties": {
              "type": "object",
              "additionalProperties": true
            }
          },
          "ociConfigured": { "type": "boolean" }
        },
        "required": ["ok", "catalogsLoaded", "loading", "catalogs", "ociConfigured"],
        "additionalProperties": false
      },
      "CatalogSearchResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "products": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "presets": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "services": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          }
        },
        "required": ["ok", "products", "presets", "services"],
        "additionalProperties": false
      },
      "CoverageResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "summary": {
            "type": "object",
            "additionalProperties": true
          },
          "services": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          }
        },
        "required": ["ok", "summary", "services"],
        "additionalProperties": false
      },
      "QuoteRequest": {
        "type": "object",
        "properties": {
          "text": { "type": "string" },
          "lines": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          }
        },
        "additionalProperties": false
      },
      "QuoteResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "source": { "type": "string" },
          "results": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "lineItems": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/QuoteLineItem" }
          },
          "warnings": {
            "type": "array",
            "items": { "type": "string" }
          },
          "errors": {
            "type": "array",
            "items": { "type": "string" }
          },
          "totals": { "$ref": "#/components/schemas/Totals" }
        },
        "additionalProperties": true
      },
      "ExcelEstimateRequest": {
        "type": "object",
        "properties": {
          "contentBase64": { "type": "string" },
          "fileName": { "type": "string" },
          "shapeName": { "type": "string" },
          "processorVendor": { "type": "string" },
          "sourcePlatform": { "type": "string" },
          "vpuPerGb": { "type": "number" },
          "sessionId": { "type": "string" },
          "userLabel": { "type": "string" },
          "clientId": { "type": "string" }
        },
        "additionalProperties": false
      },
      "WorkbookEstimateResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "source": { "type": "string" },
          "mode": { "type": "string" },
          "stage": { "type": "string" },
          "fileName": { "type": "string" },
          "summary": { "type": "string" },
          "question": { "type": "string" },
          "options": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "requests": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "results": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "lineItems": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/QuoteLineItem" }
          },
          "warnings": {
            "type": "array",
            "items": { "type": "string" }
          },
          "errors": {
            "type": "array",
            "items": { "type": "string" }
          },
          "totals": { "$ref": "#/components/schemas/Totals" },
          "session": { "$ref": "#/components/schemas/Session" }
        },
        "additionalProperties": true
      },
      "CreateSessionRequest": {
        "type": "object",
        "properties": {
          "title": { "type": "string" },
          "clientId": { "type": "string" }
        },
        "additionalProperties": false
      },
      "SessionMessageRequest": {
        "type": "object",
        "properties": {
          "role": {
            "type": "string",
            "enum": ["system", "user", "assistant", "agent"]
          },
          "content": { "type": "string" },
          "expectedVersion": { "type": "integer" }
        },
        "required": ["role", "content"],
        "additionalProperties": false
      },
      "SessionStateRequest": {
        "type": "object",
        "properties": {
          "sessionContext": {
            "type": "object",
            "nullable": true,
            "additionalProperties": true
          },
          "workbookContext": {
            "type": "object",
            "nullable": true,
            "additionalProperties": true
          },
          "title": { "type": "string" },
          "expectedVersion": { "type": "integer" }
        },
        "additionalProperties": false
      },
      "Session": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "title": { "type": "string" },
          "createdAt": { "type": "string", "nullable": true },
          "updatedAt": { "type": "string", "nullable": true },
          "version": { "type": "integer" },
          "messages": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/ConversationMessage" }
          },
          "events": {
            "type": "array",
            "items": { "type": "object", "additionalProperties": true }
          },
          "sessionContext": {
            "type": "object",
            "nullable": true,
            "additionalProperties": true
          },
          "workbookContext": {
            "type": "object",
            "nullable": true,
            "additionalProperties": true
          }
        },
        "additionalProperties": true
      },
      "SessionsListResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "sessions": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/Session" }
          }
        },
        "required": ["ok", "sessions"],
        "additionalProperties": false
      },
      "SessionEnvelope": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "session": { "$ref": "#/components/schemas/Session" }
        },
        "required": ["ok", "session"],
        "additionalProperties": false
      },
      "QuoteExportEnvelope": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "quoteExport": { "$ref": "#/components/schemas/QuoteExport" }
        },
        "required": ["ok", "quoteExport"],
        "additionalProperties": false
      },
      "QuoteLineItem": {
        "type": "object",
        "properties": {
          "product": { "type": "string" }
        },
        "additionalProperties": true
      },
      "Totals": {
        "type": "object",
        "properties": {
          "monthly": { "type": "number" },
          "annual": { "type": "number" },
          "currencyCode": { "type": "string" }
        },
        "additionalProperties": true
      },
      "QuoteExport": {
        "type": "object",
        "properties": {
          "formatVersion": { "type": "integer" },
          "generatedAt": { "type": "string" },
          "totals": { "$ref": "#/components/schemas/Totals" },
          "lineItems": {
            "type": "array",
            "items": { "$ref": "#/components/schemas/QuoteLineItem" }
          }
        },
        "additionalProperties": false
      },
      "ErrorResponse": {
        "type": "object",
        "properties": {
          "ok": { "type": "boolean" },
          "code": { "type": "string" },
          "message": { "type": "string" }
        },
        "required": ["ok", "code", "message"],
        "additionalProperties": true
      }
    }
  }
}
