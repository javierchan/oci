name: OCI DIS Blueprint Quality Gates

on:
  pull_request:
    paths:
      - "OCI DIS Blueprint/**"
      - ".github/workflows/oci-dis-blueprint-quality.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "OCI DIS Blueprint/**"
      - ".github/workflows/oci-dis-blueprint-quality.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: "OCI DIS Blueprint"

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "${{ github.workspace }}/OCI DIS Blueprint/apps/api:${{ github.workspace }}/OCI DIS Blueprint/packages/calc-engine/src"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "OCI DIS Blueprint/package-lock.json"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt mypy

      - name: Install frontend dependencies
        run: npm ci

      - name: Backend tests
        run: cd apps/api && python -m pytest --tb=short -q

      - name: Backend lint
        run: cd apps/api && python -m ruff check .

      - name: Backend type check
        run: cd apps/api && python -m mypy app --ignore-missing-imports --no-error-summary

      - name: OpenAPI artifact check
        run: cd apps/api && python scripts/export_openapi.py --check

      - name: Frontend type check
        run: cd apps/web && npx tsc --noEmit --skipLibCheck

      - name: Frontend lint
        run: cd apps/web && npx eslint . --ext .ts,.tsx --max-warnings 0
