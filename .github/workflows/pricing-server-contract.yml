name: Pricing Server Contract

on:
  pull_request:
    paths:
      - 'pricing/**'
      - '.github/workflows/pricing-server-contract.yml'
  push:
    branches:
      - main
    paths:
      - 'pricing/**'
      - '.github/workflows/pricing-server-contract.yml'

jobs:
  pricing-server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pricing/server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pricing/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run server test suite
        run: npm test
