[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oci-dis-pricing-engine"
version = "0.1.0"
description = "Pure deterministic OCI pricing calculations for governed BOMs."
requires-python = ">=3.12"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]
