name: OCI DIS Blueprint Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend, API Contract, And Calc Engine
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Lint API
        working-directory: apps/api
        run: python -m ruff check .

      - name: Type-check API
        working-directory: apps/api
        run: python -m mypy app --ignore-missing-imports --no-error-summary

      - name: Run API and calc-engine tests
        working-directory: apps/api
        env:
          PYTHONPATH: ".:../../packages/calc-engine/src"
        run: python -m pytest app/tests ../../packages/calc-engine/src/tests -q

      - name: Verify OpenAPI artifact
        run: python apps/api/scripts/export_openapi.py --check

  frontend:
    name: Frontend Build, Types, Lint, And Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "26.0.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web app
        run: npm --prefix apps/web run build

      - name: Type-check web app
        run: npm --prefix apps/web run type-check

      - name: Lint web app
        run: npm --prefix apps/web run lint

      - name: Run web unit tests
        run: npm --prefix apps/web test
