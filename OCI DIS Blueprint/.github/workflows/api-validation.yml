name: API Validation

on:
  push:
    branches:
      - main
      - codex/**
      - vscode/**
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Run backend lint and type checks
        run: |
          python -m ruff check apps/api/app apps/api/app/tests
          python -m mypy apps/api/app --ignore-missing-imports --no-error-summary
          python apps/api/scripts/export_openapi.py --check

      - name: Run API integration tests
        run: python -m pytest apps/api/app/tests -q

      - name: Run calc-engine parity tests
        run: python -m pytest packages/calc-engine/src/tests -q
