    <text x="165" y="1230" class="card-copy">Patterns, products, pricing,</text>
    <text x="165" y="1264" class="card-copy">assumptions and agent status</text>

    <rect x="130" y="1340" width="545" height="245" rx="18" fill="#EAF5FF" stroke="#3287D5" stroke-width="3"/>
    <text x="165" y="1397" class="card-title">Contextual App Assistant</text>
    <text x="165" y="1437" class="card-copy">Session-isolated support with</text>
    <text x="165" y="1471" class="card-copy">governed App-wide evidence</text>
