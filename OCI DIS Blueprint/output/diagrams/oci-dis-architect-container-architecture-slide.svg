  <rect x="1525" y="895" width="315" height="260" rx="18" fill="#FFF7E8" stroke="#D38A24" stroke-width="3"/>
  <text x="1555" y="952" class="card-title">Service Rules</text>
  <text x="1555" y="992" class="card-copy">Limits · Units</text>
