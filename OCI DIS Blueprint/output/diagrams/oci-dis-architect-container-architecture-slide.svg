  <text x="880" y="1338" class="card-copy">Deterministic engines own calculations and prices.</text>
  <circle cx="855" cy="1390" r="8" fill="#258A57"/>
  <text x="880" y="1398" class="card-copy">Services own validation, audit and explicit mutations.</text>
  <circle cx="855" cy="1450" r="8" fill="#D7462F"/>
  <text x="880" y="1458" class="card-copy">OCI GenAI explains and recommends; it never becomes</text>
  <text x="880" y="1492" class="card-copy">the source of truth.</text>

