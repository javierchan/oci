<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#101828" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#667085"/>
    </marker>
    <style>
      .title { font: 700 62px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #101828; }
      .subtitle { font: 400 27px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #667085; }
      .section { font: 700 25px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; letter-spacing: 2px; fill: #344054; }
      .card-title { font: 700 26px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #101828; }
      .card-copy { font: 400 21px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #475467; }
      .small { font: 600 18px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 0.5px; }
      .pill { font: 700 20px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; letter-spacing: 1px; }
      .connector { fill: none; stroke: #667085; stroke-width: 5; marker-end: url(#arrow); }
      .connector-soft { fill: none; stroke: #98A2B3; stroke-width: 4; marker-end: url(#arrow); }
      .connector-dash { fill: none; stroke: #98A2B3; stroke-width: 4; stroke-dasharray: 14 11; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="110" y="95" class="title">OCI DIS Architect</text>
  <text x="110" y="140" class="subtitle">Application components, deterministic engines, and production container runtime</text>

  <rect x="2540" y="63" width="550" height="66" rx="33" fill="#D7462F"/>
  <text x="2815" y="105" text-anchor="middle" class="pill" fill="#FFFFFF">ARCHITECT · ANALYST · ADMIN</text>

  <!-- Main container frames -->
  <rect x="90" y="190" width="625" height="1475" rx="30" fill="#F8FBFF" stroke="#86BCEB" stroke-width="4" filter="url(#shadow)"/>
  <rect x="755" y="190" width="1135" height="1475" rx="30" fill="#FCFAFF" stroke="#A997D0" stroke-width="4" filter="url(#shadow)"/>
  <rect x="1930" y="190" width="1180" height="530" rx="30" fill="#F8FCFA" stroke="#79B89A" stroke-width="4" filter="url(#shadow)"/>
  <rect x="1930" y="765" width="1180" height="420" rx="30" fill="#FAFBFC" stroke="#98A2B3" stroke-width="4" filter="url(#shadow)"/>
  <rect x="1930" y="1230" width="1180" height="435" rx="30" fill="#FFFAF9" stroke="#E39B8F" stroke-width="4" filter="url(#shadow)"/>

  <text x="130" y="245" class="section">WEB CONTAINER</text>
  <text x="130" y="280" class="subtitle">Next.js 15 · Node.js 26</text>

  <text x="795" y="245" class="section">API CONTAINER</text>
  <text x="795" y="280" class="subtitle">FastAPI · Python 3.12 · REST API v1</text>

  <text x="1970" y="245" class="section">ASYNCHRONOUS CONTAINERS</text>
  <text x="1970" y="280" class="subtitle">Celery workloads isolated by queue</text>

  <text x="1970" y="820" class="section">PERSISTENCE CONTAINERS</text>
  <text x="1970" y="855" class="subtitle">Durable records, coordination, and artifacts</text>

  <text x="1970" y="1285" class="section">GOVERNED OCI SERVICES</text>
  <text x="1970" y="1320" class="subtitle">External capabilities with bounded authority</text>

