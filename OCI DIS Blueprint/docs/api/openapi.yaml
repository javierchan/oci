  "info": {
    "description": "API-first platform for OCI Integration Design assessment. Enables engineers to import, govern, calculate volumetry, and export OCI integration catalogs aligned with Oracle Integration Cloud (OIC) patterns.",
    "title": "OCI DIS Blueprint API",
    "version": "1.0.0"
  },
  "openapi": "3.1.0",
  "paths": {
    "/api/v1/admin/synthetic/jobs": {
      "get": {
        "operationId": "list_jobs_api_v1_admin_synthetic_jobs_get",
        "parameters": [
          {
            "in": "query",
            "name": "limit",
            "required": false,
            "schema": {
              "default": 20,
              "maximum": 100,
              "minimum": 1,
              "title": "Limit",
              "type": "integer"
            }
          },
          {
            "in": "header",
            "name": "X-Actor-Role",
            "required": true,
            "schema": {
              "title": "X-Actor-Role",
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SyntheticGenerationJobListResponse"
                }
              }
            },
            "description": "Successful Response"
          },
          "422": {
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            },
            "description": "Validation Error"
          }
        },
        "summary": "List recent synthetic-generation jobs",
        "tags": [
          "Admin Synthetic"
        ]
      },
      "post": {
        "operationId": "create_job_api_v1_admin_synthetic_jobs_post",
