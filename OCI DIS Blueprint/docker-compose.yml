###############################################################################
# OCI DIS Blueprint — Docker Compose
# All services run in Docker Desktop (macOS).
# No macOS-native dependencies required.
#
# Usage:
#   docker compose up --build          # full stack in dev mode
#   docker compose up db redis         # infrastructure only
#   docker compose run api pytest      # run tests in API container
###############################################################################

services:

  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dis
      POSTGRES_PASSWORD: dis
      POSTGRES_DB: oci_dis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dis -d oci_dis"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Redis 7 (Celery broker + result backend)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI — API server
  # ─────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app                          # hot reload in dev
      - ./packages/calc-engine:/calc-engine:ro   # shared engine
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Celery worker (import + recalculation jobs)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./apps/api:/app
      - ./packages/calc-engine:/calc-engine:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Next.js — Web app
  # ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app                          # hot reload in dev
      - /app/node_modules                        # preserve container node_modules
      - /app/.next                               # preserve Next.js cache
    depends_on:
      api:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MinIO — S3-compatible object storage (local dev only)
  # Replaces OCI Object Storage in dev environment
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
