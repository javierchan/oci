###############################################################################
# OCI DIS Blueprint — production-mode Docker Compose stack
# All application services run from immutable production images.
# No host-level Python or Node.js dependencies are required.
#
# Usage:
#   docker compose up -d --build --wait
#   docker compose exec -T api alembic upgrade head
###############################################################################

x-api-runtime: &api-runtime
  image: ocidisblueprint-api:latest

services:

  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dis
      POSTGRES_PASSWORD: dis
      POSTGRES_DB: oci_dis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dis -d oci_dis"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Redis 7 (Celery broker + result backend)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI — API server
  # ─────────────────────────────────────────
  api:
    <<: *api-runtime
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      OCI_GENAI_REGION: ${OCI_GENAI_REGION:-us-chicago-1}
      OCI_GENAI_BASE_URL: ${OCI_GENAI_BASE_URL:-https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/openai/v1}
      OCI_GENAI_MODEL_ID: ${OCI_GENAI_MODEL_ID:-openai.gpt-oss-20b}
      OCI_GENAI_MODEL_NAME: ${OCI_GENAI_MODEL_NAME:-OpenAI gpt-oss-20b}
      OCI_GENAI_PROJECT_ID: ${OCI_GENAI_PROJECT_ID:-}
      OCI_GENAI_COMPARTMENT_ID: ${OCI_GENAI_COMPARTMENT_ID:-}
      OCI_GENAI_TRANSPORT_MODE: ${OCI_GENAI_TRANSPORT_MODE:-auto}
      OCI_GENAI_MAX_RETRIES: ${OCI_GENAI_MAX_RETRIES:-2}
      OCI_GENAI_RETRY_BASE_SECONDS: ${OCI_GENAI_RETRY_BASE_SECONDS:-0.5}
      OCI_GENAI_RETRY_MAX_SECONDS: ${OCI_GENAI_RETRY_MAX_SECONDS:-8.0}
      OCI_GENAI_GUARDRAILS_ENABLED: ${OCI_GENAI_GUARDRAILS_ENABLED:-true}
      OCI_GENAI_GUARDRAILS_VERSION: ${OCI_GENAI_GUARDRAILS_VERSION:-1.0.1}
      OCI_GENAI_GUARDRAILS_FAILURE_MODE: ${OCI_GENAI_GUARDRAILS_FAILURE_MODE:-closed}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Celery worker (import + recalculation jobs)
  # ─────────────────────────────────────────
  worker:
    <<: *api-runtime
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      OCI_GENAI_REGION: ${OCI_GENAI_REGION:-us-chicago-1}
      OCI_GENAI_BASE_URL: ${OCI_GENAI_BASE_URL:-https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/openai/v1}
      OCI_GENAI_MODEL_ID: ${OCI_GENAI_MODEL_ID:-openai.gpt-oss-20b}
      OCI_GENAI_MODEL_NAME: ${OCI_GENAI_MODEL_NAME:-OpenAI gpt-oss-20b}
      OCI_GENAI_PROJECT_ID: ${OCI_GENAI_PROJECT_ID:-}
      OCI_GENAI_COMPARTMENT_ID: ${OCI_GENAI_COMPARTMENT_ID:-}
      OCI_GENAI_TRANSPORT_MODE: ${OCI_GENAI_TRANSPORT_MODE:-auto}
      OCI_GENAI_MAX_RETRIES: ${OCI_GENAI_MAX_RETRIES:-2}
      OCI_GENAI_RETRY_BASE_SECONDS: ${OCI_GENAI_RETRY_BASE_SECONDS:-0.5}
      OCI_GENAI_RETRY_MAX_SECONDS: ${OCI_GENAI_RETRY_MAX_SECONDS:-8.0}
      OCI_GENAI_GUARDRAILS_ENABLED: ${OCI_GENAI_GUARDRAILS_ENABLED:-true}
      OCI_GENAI_GUARDRAILS_VERSION: ${OCI_GENAI_GUARDRAILS_VERSION:-1.0.1}
      OCI_GENAI_GUARDRAILS_FAILURE_MODE: ${OCI_GENAI_GUARDRAILS_FAILURE_MODE:-closed}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Dedicated governed OCI GenAI agent runtime. It shares the immutable API
  # image but consumes only the isolated agents queue.
  agent-worker:
    <<: *api-runtime
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q agents
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      OCI_GENAI_REGION: ${OCI_GENAI_REGION:-us-chicago-1}
      OCI_GENAI_BASE_URL: ${OCI_GENAI_BASE_URL:-https://inference.generativeai.us-chicago-1.oci.oraclecloud.com/openai/v1}
      OCI_GENAI_MODEL_ID: ${OCI_GENAI_MODEL_ID:-openai.gpt-oss-20b}
      OCI_GENAI_MODEL_NAME: ${OCI_GENAI_MODEL_NAME:-OpenAI gpt-oss-20b}
      OCI_GENAI_PROJECT_ID: ${OCI_GENAI_PROJECT_ID:-}
      OCI_GENAI_COMPARTMENT_ID: ${OCI_GENAI_COMPARTMENT_ID:-}
      OCI_GENAI_TRANSPORT_MODE: ${OCI_GENAI_TRANSPORT_MODE:-auto}
      OCI_GENAI_MAX_RETRIES: ${OCI_GENAI_MAX_RETRIES:-2}
      OCI_GENAI_RETRY_BASE_SECONDS: ${OCI_GENAI_RETRY_BASE_SECONDS:-0.5}
      OCI_GENAI_RETRY_MAX_SECONDS: ${OCI_GENAI_RETRY_MAX_SECONDS:-8.0}
      OCI_GENAI_GUARDRAILS_ENABLED: ${OCI_GENAI_GUARDRAILS_ENABLED:-true}
      OCI_GENAI_GUARDRAILS_VERSION: ${OCI_GENAI_GUARDRAILS_VERSION:-1.0.1}
      OCI_GENAI_GUARDRAILS_FAILURE_MODE: ${OCI_GENAI_GUARDRAILS_FAILURE_MODE:-closed}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Celery beat (optional scheduled jobs)
  # ─────────────────────────────────────────
  beat:
    <<: *api-runtime
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dis:dis@db:5432/oci_dis
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      SERVICE_VERIFICATION_SCHEDULE_ENABLED: ${SERVICE_VERIFICATION_SCHEDULE_ENABLED:-false}
      SERVICE_VERIFICATION_SCHEDULE_SECONDS: ${SERVICE_VERIFICATION_SCHEDULE_SECONDS:-86400}
      SERVICE_VERIFICATION_STALE_SCAN_MAX_SOURCES: ${SERVICE_VERIFICATION_STALE_SCAN_MAX_SOURCES:-20}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Next.js — Web app (production-mode local runtime)
  # ─────────────────────────────────────────
  web:
    image: ocidisblueprint-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MinIO — S3-compatible object storage for the local production-mode stack
  # Replace with OCI Object Storage in the deployed environment.
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:
