# Docker Compose override for local Codex backend credentials.
# Usage:
#   CODEX_HOME="$HOME/.codex" \
#     docker compose -f docker-compose.yml -f docker-compose.codex.yml up -d --build --wait
#
# This keeps LLM credentials out of .env and mounts the Codex config/auth files
# read-only at the paths consumed by apps/api/app/core/config.py.

services:
  api:
    user: "0:0"
    environment:
      CODEX_CONFIG_PATH: /tmp/oci-dis-home/codex/config.toml
      CODEX_AUTH_JSON_PATH: /tmp/oci-dis-home/codex/auth.json
    volumes:
      - ${CODEX_HOME:?Set CODEX_HOME to your Codex home directory}/config.toml:/codex-host/config.toml:ro
      - ${CODEX_HOME:?Set CODEX_HOME to your Codex home directory}/auth.json:/codex-host/auth.json:ro

  worker:
    user: "0:0"
    environment:
      CODEX_CONFIG_PATH: /tmp/oci-dis-home/codex/config.toml
      CODEX_AUTH_JSON_PATH: /tmp/oci-dis-home/codex/auth.json
    volumes:
      - ${CODEX_HOME:?Set CODEX_HOME to your Codex home directory}/config.toml:/codex-host/config.toml:ro
      - ${CODEX_HOME:?Set CODEX_HOME to your Codex home directory}/auth.json:/codex-host/auth.json:ro
