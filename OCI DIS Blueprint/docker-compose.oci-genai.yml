# OCI Generative AI API-key authentication for local validation.
# OCI_GENAI_API_KEY_FILE_HOST must point to a file containing only one active sk- secret.
services:
  api:
    user: root
    environment:
      OCI_GENAI_API_KEY_FILE: /tmp/oci-dis-home/.oci-genai/api_key
    volumes:
      - uploads_data:/app/uploads
      - ${OCI_GENAI_API_KEY_FILE_HOST:?Set OCI_GENAI_API_KEY_FILE_HOST to the OCI GenAI API key secret file}:/oci-genai-host/api_key:ro

  worker:
    user: root
    environment:
      OCI_GENAI_API_KEY_FILE: /tmp/oci-dis-home/.oci-genai/api_key
    volumes:
      - uploads_data:/app/uploads
      - ${OCI_GENAI_API_KEY_FILE_HOST:?Set OCI_GENAI_API_KEY_FILE_HOST to the OCI GenAI API key secret file}:/oci-genai-host/api_key:ro

  agent-worker:
    user: root
    environment:
      OCI_GENAI_API_KEY_FILE: /tmp/oci-dis-home/.oci-genai/api_key
    volumes:
      - uploads_data:/app/uploads
      - ${OCI_GENAI_API_KEY_FILE_HOST:?Set OCI_GENAI_API_KEY_FILE_HOST to the OCI GenAI API key secret file}:/oci-genai-host/api_key:ro
